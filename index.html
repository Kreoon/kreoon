<!doctype html>
<html lang="es" suppressHydrationWarning>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#7700b8" />
    <meta name="apple-mobile-web-app-title" content="KREOON" />

    <title>KREOON</title>

    <!-- Critical CSS inline for faster FCP -->
    <style>
      /* Critical CSS for marketplace initial render */
      :root{--background:0 0% 100%;--foreground:0 0% 10%;--card:0 0% 100%;--primary:270 100% 60%;--muted:0 0% 94%;--border:0 0% 15%}
      .dark{--background:240 10% 2%;--foreground:0 0% 98%;--card:240 10% 4%;--primary:270 100% 60%;--muted:250 15% 8%;--border:240 10% 12%}
      *,::before,::after{box-sizing:border-box;border-width:0;border-style:solid}
      html{line-height:1.5;-webkit-text-size-adjust:100%;font-family:Outfit,Manrope,system-ui,sans-serif}
      body{margin:0;line-height:inherit;background-color:hsl(var(--background));color:hsl(var(--foreground))}
      #root{min-height:100vh;display:flex;flex-direction:column}
      /* Skeleton placeholder for cards - prevents CLS */
      .creator-card-skeleton{aspect-ratio:9/16;border-radius:0.75rem;background:hsl(var(--muted)/0.4);animation:pulse 2s cubic-bezier(0.4,0,0.6,1) infinite}
      @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
      /* Grid layout placeholder */
      .grid-placeholder{display:grid;gap:1rem;grid-template-columns:repeat(2,1fr)}
      @media(min-width:640px){.grid-placeholder{grid-template-columns:repeat(3,1fr)}}
      @media(min-width:1024px){.grid-placeholder{grid-template-columns:repeat(4,1fr)}}
      @media(min-width:1280px){.grid-placeholder{grid-template-columns:repeat(5,1fr)}}
    </style>
    <meta name="description" content="El sistema operativo creativo. Gestiona creadores, contenido, proyectos y resultados desde una única plataforma." />
    <meta name="author" content="KREOON" />

    <meta property="og:title" content="KREOON - Creative Operating System" />
    <meta property="og:description" content="El sistema operativo creativo. Gestiona creadores, contenido, proyectos y resultados desde una única plataforma." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/og-image.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@KREOON_app" />
    <meta name="twitter:image" content="/og-image.png" />

    <!-- Preconnect: máximo 4 orígenes críticos (PageSpeed recomendación) -->
    <!-- Google Fonts: 2 conexiones necesarias (API + static assets) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Supabase: API principal, requiere crossorigin por CORS -->
    <link rel="preconnect" href="https://wjkbqcrxwsmvtxmqgiqc.supabase.co" crossorigin>
    <!-- wsrv.nl: image proxy crítico para el marketplace, requiere crossorigin por CORS -->
    <link rel="preconnect" href="https://wsrv.nl" crossorigin>

    <!-- DNS Prefetch: orígenes secundarios (Bunny CDN) - menor overhead que preconnect -->
    <link rel="dns-prefetch" href="https://vz-78fcd769-050.b-cdn.net">
    <link rel="dns-prefetch" href="https://cdn.kreoon.com">
    <link rel="dns-prefetch" href="https://kreoon-images.b-cdn.net">

    <!-- KREOON Web Fonts - Async loading to prevent render blocking -->
    <!-- Preload critical font (Outfit - used for headings) -->
    <link rel="preload" href="https://fonts.gstatic.com/s/outfit/v11/QGYyz_MVcBeNP4NjuGObqx1XmO1I4TC1C4G-EiAou6Y.woff2" as="font" type="font/woff2" crossorigin>

    <!-- Async font loading with media trick -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" media="print" onload="this.media='all'">
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    </noscript>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/pwa-192x192.png" />
    <link rel="icon" type="image/png" href="/favicon.png" />

    <!-- iOS splash screens -->
    <link rel="apple-touch-startup-image" href="/pwa-512x512.png" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
